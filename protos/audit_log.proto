syntax = "proto3";

package ceramicraft.log;

message RecordAuditLogRequest {
    string service = 1;       // 调用方业务/服务名称（如 "order-service", "product-service"）
    int64 actor_id = 2;       // 操作人（商家或顾客的ID）
    string role = 3;          // 操作人角色（如 "MERCHANT", "CUSTOMER", "SYSTEM"）
    string description = 4;   // 操作描述（包含原动作、资源对象、额外信息等）
    string occurred_at = 5;   // 事件实际发生时间 ISO 8601 string
}

message RecordAuditLogResponse {
    bool success = 1;
    string event_id = 2;      // 返回生成的日志记录ID
}

message AuditLog {
    string id = 1;
    string service = 2;       // 调用方业务/服务名称
    int64 actor_id = 3;
    string role = 4;
    string description = 5;
    string occurred_at = 6;    // ISO 8601 string, 事件实际发生时间
    string created_at = 7;    // ISO 8601 string
    string previous_hash = 8;
    string current_hash = 9;
}

message QueryAuditLogsRequest {
    optional int64 actor_id = 1;
    optional string service = 2;    // 按调用方业务/服务筛选
    optional string role = 3;
    optional string start_time = 4; // ISO 8601 string
    optional string end_time = 5;   // ISO 8601 string
    int32 limit = 6;                // 分页大小
    int32 offset = 7;               // 偏移量
}

message QueryAuditLogsResponse {
    repeated AuditLog logs = 1;
    int32 total_count = 2;
}

message VerifyAuditLogChainRequest {
    // 可以为空，默认验证全量。如果以后需要按时间范围验证可以扩充
    optional string start_time = 1; // ISO 8601 string
    optional string end_time = 2;   // ISO 8601 string
}

message VerifyAuditLogChainResponse {
    bool is_valid = 1;
    string failed_log_id = 2;       // 如果验证失败，这里返回发生断链或篡改的日志ID
    string message = 3;             // 错误详情或者成功提示
}

service AuditLogService {
    rpc RecordAuditLog (RecordAuditLogRequest) returns (RecordAuditLogResponse);
    rpc QueryAuditLogs (QueryAuditLogsRequest) returns (QueryAuditLogsResponse);
    rpc VerifyAuditLogChain (VerifyAuditLogChainRequest) returns (VerifyAuditLogChainResponse);
}
